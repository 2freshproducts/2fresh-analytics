name: Weekly TikTok Summary

on:
  schedule:
    # Sunday 8pm Melbourne.
    # AEDT: 09:00 UTC Sunday. AEST: 10:00 UTC Sunday.
    # Using AEST cron year-round — drift of 1 hour during AEDT is acceptable
    # for a weekly summary message.
    - cron: '0 10 * * 0'
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run weekly summary
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
        run: python weekly.py
